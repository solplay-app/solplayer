name: Build Windows Desktop App

# Déclenchement :
# - manuel (bouton "Run workflow" dans l'onglet Actions de GitHub) ;
# - automatique sur un tag "vX.Y.Z" poussé sur le repo, pratique pour
#   publier une version numérotée sans y penser.
#
# Hypothèse de structure du repo (à ajuster si votre arborescence diffère) :
#   /backend    -> crimtrack-backend (FastAPI)
#   /frontend   -> crimtrack-frontend (HTML/JS statique)
#   /desktop    -> crimtrack-desktop (Electron), ce dossier
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Compiler le backend en exécutable (PyInstaller)
        working-directory: backend
        run: |
          pyinstaller --onefile --name crimtrack-backend `
            --collect-all pytesseract `
            --collect-all cv2 `
            --hidden-import passlib.handlers.bcrypt `
            run_desktop.py

      - name: Préparer les ressources pour Electron
        run: |
          New-Item -ItemType Directory -Force -Path desktop/resources/backend
          New-Item -ItemType Directory -Force -Path desktop/resources/frontend
          Copy-Item backend/dist/crimtrack-backend.exe desktop/resources/backend/
          Copy-Item -Recurse frontend/* desktop/resources/frontend/

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer les dépendances Electron
        working-directory: desktop
        run: npm install

      - name: Construire l'installeur Windows
        working-directory: desktop
        run: npm run dist:win

      - name: Publier l'installeur comme artefact du build
        uses: actions/upload-artifact@v4
        with:
          name: CrimTrack-installer-windows
          path: desktop/dist/*.exe

      - name: Publier une Release GitHub (si le build vient d'un tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/*.exe
